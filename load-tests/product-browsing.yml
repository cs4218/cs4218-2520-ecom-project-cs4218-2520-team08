config:
  target: "http://localhost:6060"
  phases:
    - name: "Warm up"
      duration: 30
      arrivalRate: 5
    - name: "Ramp up"
      duration: 60
      arrivalRate: 5
      rampTo: 30
    - name: "Peak load"
      duration: 60
      arrivalRate: 30
  http:
    timeout: 10
  plugins:
    expect: {}

scenarios:
  - name: "Browse product listing (paginated)"
    weight: 40
    flow:
      - get:
          url: "/api/v1/product/product-count"
          expect:
            - statusCode: 200
      - think: 1
      - get:
          url: "/api/v1/product/product-list/1"
          expect:
            - statusCode: 200
      - think: 2
      - get:
          url: "/api/v1/product/product-list/2"
          expect:
            - statusCode: 200

  - name: "View all products"
    weight: 30
    flow:
      - get:
          url: "/api/v1/product/get-product"
          expect:
            - statusCode: 200
          capture:
            - json: "$.products[0].slug"
              as: "productSlug"
      - think: 2
      - get:
          url: "/api/v1/product/get-product/{{ productSlug }}"
          ifTrue: "productSlug"
          expect:
            - statusCode: 200

  - name: "View product photo"
    weight: 30
    flow:
      - get:
          url: "/api/v1/product/get-product"
          expect:
            - statusCode: 200
          capture:
            - json: "$.products[0]._id"
              as: "productId"
      - think: 1
      - get:
          url: "/api/v1/product/product-photo/{{ productId }}"
          ifTrue: "productId"
          expect:
            - statusCode: 200
