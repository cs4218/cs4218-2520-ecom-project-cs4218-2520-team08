config:
  target: "http://localhost:6060"
  phases:
    - name: "Warm up"
      duration: 30
      arrivalRate: 5
    - name: "Ramp up"
      duration: 60
      arrivalRate: 5
      rampTo: 30
    - name: "Peak load"
      duration: 60
      arrivalRate: 30
  http:
    timeout: 10
  plugins:
    expect: {}
  payload:
    path: "./data/search-keywords.csv"
    fields:
      - "keyword"

scenarios:
  - name: "Search products by keyword"
    weight: 40
    flow:
      - get:
          url: "/api/v1/product/search/{{ keyword }}"
          expect:
            - statusCode: 200
      - think: 2

  - name: "Filter products by price range"
    weight: 30
    flow:
      - post:
          url: "/api/v1/product/product-filters"
          json:
            checked: []
            radio: [0, 19]
          expect:
            - statusCode: 200
      - think: 1
      - post:
          url: "/api/v1/product/product-filters"
          json:
            checked: []
            radio: [20, 39]
          expect:
            - statusCode: 200
      - think: 1
      - post:
          url: "/api/v1/product/product-filters"
          json:
            checked: []
            radio: [40, 59]
          expect:
            - statusCode: 200

  - name: "Search then filter"
    weight: 30
    flow:
      - get:
          url: "/api/v1/product/search/{{ keyword }}"
          expect:
            - statusCode: 200
      - think: 2
      - post:
          url: "/api/v1/product/product-filters"
          json:
            checked: []
            radio: [0, 99]
          expect:
            - statusCode: 200
      - think: 1
